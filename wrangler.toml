# Cloudflare Workers Assets configuration.
#
# Deploys retropal-website as a static-asset Worker. Cloudflare unified
# Pages and Workers under the Workers Builds flow in 2025 and prefers
# the [assets] model over the old `pages_build_output_dir`. Same end
# result, modern config.
#
# Docs: https://developers.cloudflare.com/workers/static-assets/

name = "retropal-website"
compatibility_date = "2024-09-23"

[assets]
directory = "./dist"
not_found_handling = "404-page"
